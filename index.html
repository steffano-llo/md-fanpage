<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/jpeg" href="assets/images/favicon.jpg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madison Beer | Immersive Portfolio</title>

    <!-- Google Fonts: Oswald & Cormorant Garamond -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Oswald:wght@200;300;400;500&family=Great+Vibes&display=swap"
        rel="stylesheet">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/home.css">

    <!-- GSAP for Animations -->
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>

<body>
    <!-- Immersive Page Transition -->
    <div class="cinema-transition"></div>

    <!-- Corner-Anchored Navigation -->
    <nav class="nav-corner logo-corner">
        <a href="index.html" class="logo-text">madison beer</a>
    </nav>
    <nav class="nav-corner menu-corner">
        <a href="music.html" class="menu-link">MUSIC VIDEOS</a>
        <a href="gallery.html" class="menu-link">GALLERY</a>
        <a href="info.html" class="menu-link">INFO</a>
    </nav>

    <!-- Deep Cinematic Hero Section -->
    <main class="hero-immersive" id="heroContainer">

        <!-- Full Screen Background Video -->
        <div class="video-layer">
            <video class="hero-bg-video" id="mainVideo" autoplay loop muted playsinline>
                <source src="assets/videos/preview/md-badenough-preview.mp4" type="video/mp4">
            </video>
        </div>

        <!-- Heavy Vignette Overlay -->
        <div class="vignette-overlay"></div>

        <!-- Typography Layer -->
        <!-- Placed absolute center, massive scale -->
        <div class="typography-layer">
            <div class="title-container"
                style="display: flex; flex-direction: column; align-items: center; gap: 1.5rem;">
                <h1 class="h-xl glitch-text" id="mainTitle">BAD ENOUGH</h1>
                <span class="eyebrow" id="albumLabel"
                    style="font-family: var(--font-serif); font-size: 1.5rem; text-transform: none; color: rgba(255,255,255,0.9); text-shadow: 0 4px 15px rgba(0,0,0,0.8), 0 0 40px rgba(0,0,0,0.6); font-weight: 400;">"Locket"
                    (Album)</span>
            </div>
        </div>

        <!-- Custom Immersive Cursor / Video Slider Controls -->
        <div class="click-zones">
            <div class="zone zone-left" id="prevZone">
                <span class="zone-text caption-txt">Previous</span>
            </div>
            <div class="zone zone-right" id="nextZone">
                <span class="zone-text caption-txt">Next</span>
            </div>
        </div>

    </main>

    <!-- Project specific JS -->
    <script defer src="assets/js/home.js"></script>
</body>

</html>
